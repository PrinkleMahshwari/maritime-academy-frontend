<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Deep premium midnight-ocean gradient for the background tile -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0C2540" />
      <stop offset="50%" stop-color="#041528" />
      <stop offset="100%" stop-color="#010A15" />
    </linearGradient>

    <!-- Vibrant cyan-to-teal gradient for the ocean waves -->
    <linearGradient id="waveGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#009B86" />
    </linearGradient>

    <!-- Clip path to keep waves and yacht perfectly inside the rounded tile -->
    <clipPath id="tileClip">
      <rect x="12" y="12" width="488" height="488" rx="96" />
    </clipPath>

    <!-- High-end drop shadow for yacht elements -->
    <filter id="yachtShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="6" flood-color="#010A15" flood-opacity="0.8" />
    </filter>
  </defs>

  <!-- Glowing outer tile container (like Gmail/W3Schools app icons) -->
  <rect x="12" y="12" width="488" height="488" rx="96" fill="url(#bgGradient)" stroke="#00D2B4" stroke-width="12" />

  <!-- Clipped contents to ensure clean edges -->
  <g clip-path="url(#tileClip)">
    <!-- Large, bright brand sun in the background -->
    <path d="M 136,255 A 120,120 0 0,1 376,255 Z" fill="#00D2B4" opacity="0.95" />
    
    <!-- Background wave layer for depth -->
    <path d="M 0,350 Q 160,380 320,330 T 512,360 L 512,512 L 0,512 Z" fill="#007E94" opacity="0.4" />

    <!-- Foreground wave layer -->
    <path d="M 0,370 Q 128,340 256,380 T 512,360 L 512,512 L 0,512 Z" fill="url(#waveGradient)" />

    <!-- Massive white yacht, riding the waves, overlapping the sun -->
    <g transform="translate(-63.5, 189) scale(1.8)" stroke="#020E1C" stroke-width="1.8" stroke-linejoin="round" filter="url(#yachtShadow)">
      <!-- Teal Wake Splashes (drawn close to wave height) -->
      <path d="M 45,86 C 60,86 70,72 90,72 C 115,72 110,86 145,86 C 160,86 165,82 175,82 C 150,86 120,86 100,82 C 75,77 65,86 45,86 Z" fill="#00D2B4" />

      <!-- Main White Yacht Structural Elements -->
      <path d="M 105,53 C 130,53 155,58 190,48 C 170,56 145,58 120,58 Z" fill="#FFFFFF" />
      <path d="M 82,60 C 115,60 145,55 170,44 C 185,41 210,50 240,59 C 190,59 140,65 95,65 Z" fill="#FFFFFF" />
      <path d="M 60,71 C 110,71 160,67 215,63 C 255,60 285,68 310,75 C 240,86 170,95 125,82 C 95,73 75,74 60,71 Z" fill="#FFFFFF" />
      <path d="M 195,84 C 220,88 245,84 275,80 C 250,85 220,89 195,84 Z" fill="#FFFFFF" />
      <path d="M 225,88 C 245,91 265,88 285,84 C 260,89 240,92 225,88 Z" fill="#FFFFFF" />
    </g>
  </g>
</svg>
